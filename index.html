<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Trails | Веломаршруты России</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="hero">
            <div class="hero-badge">🚵‍♂️ RIDE RUSSIA</div>
            <h1 class="hero-title">Bike <span class="gradient-text">Trails</span></h1>
            <p class="hero-subtitle">Лучшие веломаршруты по России</p>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">6</div><div class="stat-label">Маршрутов</div></div>
                <div class="stat-card"><div class="stat-value">6+</div><div class="stat-label">Регионов</div></div>
                <div class="stat-card"><div class="stat-value">3</div><div class="stat-label">Уровня</div></div>
            </div>
        </header>

        <div class="filters-section">
            <h2 class="section-title">Выбери свой маршрут</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-level="all">Все маршруты</button>
                <button class="filter-btn" data-level="easy">🟢 Лёгкие</button>
                <button class="filter-btn" data-level="medium">🔵 Средние</button>
                <button class="filter-btn" data-level="hard">⚫ Сложные</button>
            </div>
        </div>

        <div class="trails-container" id="trailsContainer">
            <div class="loading-spinner"></div>
        </div>

        <footer class="footer">
            <p>© 2025 Bike Trails — веломаршруты по России</p>
            <p class="footer-note">Нажмите на карточку, чтобы открыть маршрут</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html><head>
